<!doctype html>
<html lang="en" data-theme="dark" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#0D110D" />
    <meta name="description" content="Your community, in one place." />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Local</title>
    <!--
      Cold-boot theme script (THEMING_ARCHITECTURE.md). Runs before React mounts so the
      first paint is already themed and the seven axes are stamped. Kept as an external,
      same-origin file (not inline) so the production CSP stays script-src 'self'.
    -->
    <script src="/theme-boot.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
